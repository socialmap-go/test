<!DOCTYPE html>
<html lang="si">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cashier Portal | Mapa Solutions</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f5; margin: 0; padding: 0; display: flex; justify-content: center; min-height: 100vh; align-items: center; }
    .container { width: 100%; max-width: 400px; margin: 20px; padding: 25px; background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); text-align: center; box-sizing: border-box; }
    .header-title { font-size: 22px; color: #2e7d32; font-weight: 900; margin-bottom: 5px; }
    .shop-name { font-size: 14px; color: #666; margin-bottom: 20px; }
    
    input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; text-align: center; }
    .input-label { text-align: left; font-size: 13px; font-weight: bold; color: #555; display: block; margin-top: 10px; margin-bottom: -5px;}
    
    .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; margin-bottom: 10px; color: white; transition: 0.2s; }
    .btn-green { background: #2e7d32; }
    .btn-green:hover { background: #1b5e20; }
    .btn-blue { background: #1976d2; }
    .btn-red { background: #d32f2f; }
    .btn-dark { background: #333; }
    
    .msg-box { padding: 15px; border-radius: 10px; margin-bottom: 15px; font-weight: bold; display: none; font-size: 14px; }
    .customer-stats { background: #f4f6f8; padding: 15px; border-radius: 10px; margin-bottom: 15px; display: none; border: 1px solid #ddd; }
  </style>
</head>
<body>

  <div class="container">
    <div class="header-title"><i class="fas fa-cash-register"></i> Cashier Terminal</div>
    <div class="shop-name" id="shopNameDisplay">Loading...</div>

    <div id="actionMsg" class="msg-box"></div>

    <label class="input-label">Customer Phone Number</label>
    <input type="number" id="cPhone" placeholder="07XXXXXXXX">
    
    <button class="btn btn-blue" onclick="checkCustomer()"><i class="fas fa-search"></i> Check Customer Points</button>

    <div id="customerStats" class="customer-stats">
      <div style="font-size: 12px; color: gray;">Current Points</div>
      <div style="font-size: 28px; color: #1976d2; font-weight: bold;" id="statPoints">0</div>
      <hr style="border: 0; border-top: 1px solid #ddd; margin: 10px 0;">
      <div style="display: flex; gap: 10px;">
        <button class="btn btn-red" style="padding: 10px; font-size: 13px;" onclick="processAction('loyaltyRedeem')"><i class="fas fa-gift"></i> Redeem Reward</button>
        <button class="btn btn-dark" style="padding: 10px; font-size: 13px;" onclick="processAction('loyaltyCashierReset')"><i class="fas fa-key"></i> Reset PIN (0000)</button>
      </div>
    </div>

    <hr style="border: 0; border-top: 2px dashed #eee; margin: 20px 0;">

    <label class="input-label">Bill Amount (Rs.)</label>
    <input type="number" id="cBillAmount" placeholder="e.g. 3500">

    <button class="btn btn-green" onclick="processAction('loyaltyAddPoints')"><i class="fas fa-plus-circle"></i> Add Points via Bill</button>

  </div>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzTUByYnRXZY3xdtIe5I_X_yLQ5qnIN8boGIh_o3ecXh5gBoNK1JPrpE61ODHobA_Is/exec"; 

    window.onload = () => {
      const shopId = localStorage.getItem('shopId');
      const bName = localStorage.getItem('businessName');
      
      if(!shopId) {
        alert("Session Expired. Please Login Again from Client Portal.");
        return;
      }
      
      sessionStorage.setItem('cashierShopId', shopId);
      if(bName) document.getElementById('shopNameDisplay').innerText = bName;
    };

    function checkCustomer() {
      const shopId = sessionStorage.getItem('cashierShopId'); 
      const phone = document.getElementById('cPhone').value; 
      
      if(phone.length !== 10) { showMsg('Please enter a valid 10-digit number.', false); return; }
      
      showMsg("Checking...", true, "#eee", "black");
      
      fetch(`${APPS_SCRIPT_URL}?action=getCashierLoyalty&shopId=${shopId}&phone=${phone}`)
        .then(res => res.json())
        .then(data => {
          if(data.success) {
            document.getElementById('actionMsg').style.display = "none";
            document.getElementById('customerStats').style.display = "block";
            document.getElementById('statPoints').innerText = data.stamps;
          } else {
            document.getElementById('customerStats').style.display = "none";
            showMsg(data.error, false);
          }
        }).catch(err => showMsg("Network Error!", false));
    }

    function processAction(actionType) {
      const shopId = sessionStorage.getItem('cashierShopId'); 
      const phone = document.getElementById('cPhone').value; 
      const billAmount = document.getElementById('cBillAmount').value; 
      
      if(phone.length !== 10) { showMsg('Please enter a valid 10-digit number.', false); return; }
      if(actionType === 'loyaltyAddPoints' && (!billAmount || billAmount <= 0)) {
        showMsg('Please enter a valid Bill Amount.', false); return;
      }
      
      showMsg("Processing Please Wait...", true, "#eee", "black");
      
      fetch(APPS_SCRIPT_URL, { 
        method: 'POST', 
        body: JSON.stringify({ action: actionType, shopId: shopId, phone: phone, billAmount: billAmount }) 
      })
      .then(res => res.json())
      .then(data => { 
        if(data.success) { 
          showMsg(data.message, true); 
          document.getElementById('cBillAmount').value = ""; 
          checkCustomer(); // Auto refresh points
        } else { 
          showMsg(data.error, false); 
        } 
      }).catch(err => showMsg("Network Error!", false));
    }

    function showMsg(text, isSuccess, bgColor, textColor) { 
      let m = document.getElementById('actionMsg'); 
      m.innerHTML = text; 
      m.style.background = bgColor || (isSuccess ? "#e8f5e9" : "#ffebee"); 
      m.style.color = textColor || (isSuccess ? "#2e7d32" : "#d32f2f"); 
      m.style.display = "block"; 
    }
  </script>
</body>
</html>
