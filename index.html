<!DOCTYPE html> 
<html lang="si">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting | Mapa Solutions</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f9f9f9; text-align: center; margin: 0; padding: 50px 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; box-sizing: border-box; }
    .branding { font-weight: 900; color: #d32f2f; font-size: 24px; margin-bottom: 20px; letter-spacing: 1px; }
    .loader { border: 4px solid #f3f3f3; border-top: 4px solid #d32f2f; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .status-text { color: #555; font-size: 16px; font-weight: bold; margin-top: 10px; }
    .error-box { background: #fde4e4; color: #d32f2f; padding: 15px; border-radius: 8px; font-weight: bold; margin-top: 20px; display: none; border: 1px solid #f5c6c6; }
  </style>
</head>
<body>

  <div class="branding">Mapa Solutions</div>
  
  <div class="loader" id="loader"></div>
  <div class="status-text" id="statusText">System Processing... Please wait.</div>
  
  <div class="error-box" id="errorBox"></div>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzTUByYnRXZY3xdtIe5I_X_yLQ5qnIN8boGIh_o3ecXh5gBoNK1JPrpE61ODHobA_Is/exec";

    window.onload = () => {
      const urlParams = new URLSearchParams(window.location.search);
      const shopId = urlParams.get('id');

      // Device detection (Fact-based User Agent check)
      const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
      const deviceType = isMobile ? "Mobile" : "Desktop";

      if (shopId) {
        // Backend API Call for Analytics & Redirection
        fetch(`${APPS_SCRIPT_URL}?action=scan&id=${shopId}&device=${deviceType}`)
          .then(res => res.json())
          .then(data => {
            if (data.error) {
              showError(data.error);
            } else if (data.success) {
              // Redirection Logic
              if (data.destination === "profile" || data.destination === "Smart Profile") {
                window.location.href = `profile/index.html?id=${shopId}`;
              } else {
                window.location.href = data.destination;
              }
            }
          })
          .catch(err => {
            showError("Network Error. Krupaya internet connection check kara.");
          });
      } else {
        showError("Invalid QR Code. Krupaya yogya QR code scan kara.");
      }
    };

    function showError(msg) {
      document.getElementById('loader').style.display = 'none';
      document.getElementById('statusText').style.display = 'none';
      const errBox = document.getElementById('errorBox');
      errBox.innerText = msg;
      errBox.style.display = 'block';
    }
  </script>
</body>
</html>
