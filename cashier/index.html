<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cashier Portal | Social Map</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #eef2f5; margin: 0; padding: 0; display: flex; justify-content: center; min-height: 100vh; align-items: center;}
    .container { width: 100%; max-width: 400px; margin: 20px; padding: 25px; background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); text-align: center; box-sizing: border-box;}
    input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; text-align: center; }
    .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; margin-bottom: 10px; color: white; transition: 0.2s;}
    .btn:active { transform: scale(0.98); }
    
    .input-label { text-align: left; font-size: 13px; font-weight: bold; color: #555; display: block; margin-top: 10px;}
    .msg { padding: 15px; border-radius: 8px; font-weight: bold; display: none; margin-top: 10px; font-size: 14px;}
    
    .header-box { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; padding-bottom: 15px; border-bottom: 2px dashed #eee;}
  </style>
</head>
<body>

  <!-- CASHIER LOGIN SYSTEM -->
  <div class="container" id="loginBox">
    <div style="background: #e65100; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 24px; margin: 0 auto 15px auto;">
      <i class="fas fa-cash-register"></i>
    </div>
    <h2 style="margin-top: 0; color: #333;">Cashier Login</h2>
    <p style="color:#777; font-size:14px; margin-bottom: 20px;">Secure Access for Shop Staff</p>
    
    <input type="tel" id="uPhone" placeholder="Shop Phone Number">
    <input type="password" id="uPass" placeholder="Password">
    
    <button class="btn" style="background:#e65100; margin-top: 10px;" onclick="login()">Login to Cashier</button>
    <p id="loginMsg" style="color:red; font-size:13px; display:none;"></p>
  </div>

  <!-- MAIN CASHIER PORTAL -->
  <div class="container" id="mainApp" style="display: none;">
    
    <div class="header-box">
      <div style="text-align:left;">
        <h3 id="shopName" style="margin:0; color:#e65100;">Shop Name</h3>
        <p style="margin:0; font-size:12px; color:gray;" id="shopIdDisplay">Cashier Mode</p>
      </div>
      <button onclick="logout()" style="background:#f4f6f8; border:1px solid #ddd; padding:8px 15px; border-radius:8px; color:#555; font-weight:bold; cursor:pointer;">Logout</button>
    </div>

    <!-- Loyalty Management UI -->
    <div style="background: #fff3e0; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #ffe0b2;">
      <span class="input-label" style="color:#e65100;">Customer Phone Number</span>
      <div style="display:flex; gap:10px; margin-bottom:10px;">
        <input type="tel" id="cPhone" placeholder="07XXXXXXXX" maxlength="10" style="margin:0; flex:1;">
        <button class="btn" style="background:#1976d2; margin:0; width:auto; padding:0 20px;" onclick="checkCustomerLoyalty()"><i class="fas fa-search"></i></button>
      </div>
      
      <span class="input-label" style="color:#e65100;">Number of Stamps to Give</span>
      <input type="number" id="cStampCount" value="1" min="1" style="background: white;">
    </div>

    <button class="btn" style="background:#2e7d32;" onclick="processAction('loyaltyAddStamp')"><i class="fas fa-stamp"></i> Add Stamps</button>
    <button class="btn" style="background:#ff9800;" onclick="processAction('loyaltyRedeem')"><i class="fas fa-gift"></i> Redeem Reward</button>
    <button class="btn" style="background:#757575;" onclick="processAction('loyaltyCashierReset')"><i class="fas fa-undo"></i> Reset User PIN</button>
    
    <div id="actionMsg" class="msg"></div>

  </div>

  <script>
    // WEB APP URL HERE
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzU8NQF6m62kbDwCr6ol48LEVl8-veggT_bR5Lue7sIrJWlgpiI7GzosU_PqZzzV0JP/exec";

    function login() {
      const phone = document.getElementById('uPhone').value; 
      const pass = document.getElementById('uPass').value;
      const msg = document.getElementById('loginMsg');
      
      msg.style.display = "none"; 
      document.querySelector('#loginBox .btn').innerText = "Verifying...";
      
      fetch(`${APPS_SCRIPT_URL}?action=clientLogin&phone=${phone}&password=${pass}`)
        .then(res => res.json())
        .then(data => {
          document.querySelector('#loginBox .btn').innerText = "Login to Cashier";
          if(data.success) { 
            if(data.isExpired) {
               msg.innerText = "Your shop subscription has expired.";
               msg.style.display = "block";
               return;
            }
            if(data.loyaltyStatus === 'Inactive') {
               msg.innerText = "Loyalty System is disabled for your shop.";
               msg.style.display = "block";
               return;
            }
            // Save temporary cashier session
            sessionStorage.setItem('cashierShopId', data.shopId); 
            sessionStorage.setItem('cashierShopName', data.businessName); 
            initApp(); 
          } 
          else { 
            msg.innerText = data.error || "Invalid Credentials"; 
            msg.style.display = "block"; 
          }
        }).catch(err => { 
          document.querySelector('#loginBox .btn').innerText = "Login to Cashier"; 
          alert("Network Error!"); 
        });
    }

    function logout() { 
      sessionStorage.clear(); 
      location.reload(); 
    }

    function initApp() {
      document.getElementById('loginBox').style.display = 'none'; 
      document.getElementById('mainApp').style.display = 'block';
      document.getElementById('shopName').innerText = sessionStorage.getItem('cashierShopName'); 
    }

    // Auto-login check if already verified in this session
    if(sessionStorage.getItem('cashierShopId')) {
      initApp();
    }

    function checkCustomerLoyalty() {
      const shopId = sessionStorage.getItem('cashierShopId'); 
      const phone = document.getElementById('cPhone').value;
      const msgBox = document.getElementById('actionMsg');
      
      if(phone.length !== 10) { showMsg('actionMsg', "Please enter a valid 10-digit number.", false); return; }
      
      msgBox.innerText = "Checking Database..."; 
      msgBox.style.display="block"; msgBox.style.background="#e3f2fd"; msgBox.style.color="#1565c0";
      
      fetch(`${APPS_SCRIPT_URL}?action=getCashierLoyalty&shopId=${shopId}&phone=${phone}`)
        .then(res=>res.json())
        .then(data => {
          if(data.success) {
             msgBox.innerHTML = `Current Stamps: <span style="font-size:20px; font-weight:bold; color:#d32f2f;">${data.stamps}</span> <br> Total Redeemed: <span style="font-size:18px; font-weight:bold; color:#2e7d32;">${data.redeemed}</span>`;
          } else { 
            showMsg('actionMsg', data.error || "Customer not found.", false); 
          }
      }).catch(err => showMsg('actionMsg', "Network Error", false));
    }

    function processAction(actionType) {
      const shopId = sessionStorage.getItem('cashierShopId'); 
      const phone = document.getElementById('cPhone').value; 
      const count = document.getElementById('cStampCount').value; 
      const msgBox = document.getElementById('actionMsg');
      
      if(phone.length !== 10) { showMsg('actionMsg', "Please enter a valid 10-digit number.", false); return; }
      
      msgBox.innerText = "Processing Please Wait..."; 
      msgBox.style.display="block"; msgBox.style.background="#eee"; msgBox.style.color="black";
      
      fetch(APPS_SCRIPT_URL, { 
        method: 'POST', 
        body: JSON.stringify({ action: actionType, shopId: shopId, phone: phone, stampCount: count }) 
      })
      .then(res => res.json())
      .then(data => { 
        if(data.success) { 
          showMsg('actionMsg', data.message, true); 
          document.getElementById('cPhone').value = ""; 
          document.getElementById('cStampCount').value = 1; 
        } else { 
          showMsg('actionMsg', data.error, false); 
        } 
      }).catch(err => showMsg('actionMsg', "Network Error!", false));
    }

    function showMsg(id, text, success) { 
      let m = document.getElementById(id); 
      m.innerHTML = text; 
      m.style.background = success ? "#d4edda" : "#f8d7da"; 
      m.style.color = success ? "#155724" : "#721c24"; 
      m.style.display = "block"; 
    }
  </script>
</body>
</html>
