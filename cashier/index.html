<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cashier Portal | Social Map</title>
  <style>
    body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; }
    .container { background: white; padding: 30px; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; }
    .shop-name-badge { display: inline-block; background: #ffebee; color: #d32f2f; padding: 8px 20px; border-radius: 25px; font-weight: bold; margin-bottom: 20px;}
    .input-group { margin-bottom: 20px; text-align: left; }
    label { font-weight: bold; font-size: 14px; color: #555; display: block; margin-bottom: 8px; }
    input { width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 10px; font-size: 18px; text-align: center; box-sizing: border-box;}
    .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 10px; color: white;}
    .msg { padding: 15px; margin-top: 15px; border-radius: 8px; font-weight: bold; display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h2 style="margin:0 0 5px 0;">🎁 Cashier Portal</h2>
    <div class="shop-name-badge" id="shopNameDisplay">Loading...</div>

    <div class="input-group">
      <label>Customer Phone Number</label>
      <div style="display:flex; gap:10px;">
        <input type="tel" id="phone" placeholder="07XXXXXXXX" maxlength="10" style="margin:0; flex:1;">
        <button class="btn" style="background:#1976d2; margin:0; width:auto; padding:0 20px;" onclick="checkCustomerLoyalty()">🔍 Check</button>
      </div>
    </div>
    
    <div class="input-group">
      <label>Number of Stamps to Give</label>
      <input type="number" id="stampCount" value="1" min="1">
    </div>

    <button class="btn" style="background:#2e7d32;" onclick="processAction('loyaltyAddStamp')">+ Add Stamps</button>
    <button class="btn" style="background:#ff9800;" onclick="processAction('loyaltyRedeem')">🎁 Redeem Reward</button>
    <button class="btn" style="background:#757575;" onclick="processAction('loyaltyCashierReset')">🔄 Reset PIN</button>

    <div id="msgBox" class="msg"></div>
  </div>

  <script>
    // WEB APP URL HERE
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzUNv3bLJX2yfMmxfoWtDyETRQ3r0yLkC5eSA9kI4DTccE-UXV471luYE7_ZXB9sLfy/exec";
    let currentShopId = new URLSearchParams(window.location.search).get('id');

    window.onload = function() {
      if(currentShopId) {
        fetch(`${APPS_SCRIPT_URL}?action=profile&id=${currentShopId}`).then(res=>res.json()).then(data => {
          document.getElementById('shopNameDisplay').innerText = data.success ? data.data.BusinessName : "Shop: " + currentShopId;
        });
      }
    };

    function checkCustomerLoyalty() {
      const phone = document.getElementById('phone').value;
      const msgBox = document.getElementById('msgBox');
      if(!currentShopId || phone.length !== 10) return showMsg("Please enter a valid 10-digit number.", false);
      msgBox.innerText = "Checking..."; msgBox.style.display="block"; msgBox.style.background="#e3f2fd"; msgBox.style.color="#1565c0";
      fetch(`${APPS_SCRIPT_URL}?action=getCashierLoyalty&shopId=${currentShopId}&phone=${phone}`).then(res=>res.json()).then(data => {
        if(data.success) {
           msgBox.innerHTML = `Current Stamps: <span style="font-size:18px; font-weight:bold; color:#d32f2f;">${data.stamps}</span> <br> Total Redeemed Rewards: <span style="font-size:18px; font-weight:bold; color:#2e7d32;">${data.redeemed}</span>`;
        } else { showMsg(data.error, false); }
      }).catch(err => showMsg("Network Error", false));
    }

    function processAction(actionType) {
      const phone = document.getElementById('phone').value;
      const count = document.getElementById('stampCount').value;
      const msgBox = document.getElementById('msgBox');
      
      if(!currentShopId || phone.length !== 10) return showMsg("Please enter a valid 10-digit number.", false);
      
      msgBox.innerText = "Processing..."; msgBox.style.display="block"; msgBox.style.background="#eee"; msgBox.style.color="black";
      
      fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: actionType, shopId: currentShopId, phone: phone, stampCount: count }) })
      .then(res => res.json()).then(data => {
        if(data.success) { showMsg(data.message, true); document.getElementById('phone').value = ""; document.getElementById('stampCount').value = 1; } 
        else { showMsg(data.error, false); }
      });
    }

    function showMsg(text, success) {
      let m = document.getElementById('msgBox'); m.innerText = text; m.style.background = success?"#d4edda":"#f8d7da"; m.style.color = success?"#155724":"#721c24";
    }
  </script>
</body>
</html>
